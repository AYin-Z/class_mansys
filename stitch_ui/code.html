<!DOCTYPE html>

<html lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Quantitative Score Entry Confirmation</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-container-low": "#f2f4f7",
                        "surface": "#f7f9fc",
                        "inverse-surface": "#2d3133",
                        "background": "#f7f9fc",
                        "inverse-primary": "#a7c8ff",
                        "on-secondary-fixed-variant": "#2e4b57",
                        "tertiary-container": "#6e0006",
                        "secondary-container": "#c6e4f4",
                        "on-secondary": "#ffffff",
                        "inverse-on-surface": "#eff1f4",
                        "surface-container-highest": "#e0e3e6",
                        "surface-container-high": "#e6e8eb",
                        "on-primary-container": "#799dd6",
                        "tertiary": "#460002",
                        "primary": "#001e40",
                        "on-secondary-container": "#4a6774",
                        "secondary-fixed": "#c9e7f7",
                        "on-primary": "#ffffff",
                        "tertiary-fixed": "#ffdad6",
                        "on-tertiary-fixed-variant": "#93000b",
                        "surface-variant": "#e0e3e6",
                        "on-surface-variant": "#43474f",
                        "on-tertiary": "#ffffff",
                        "primary-container": "#003366",
                        "on-background": "#191c1e",
                        "surface-dim": "#d8dadd",
                        "primary-fixed": "#d5e3ff",
                        "primary-fixed-dim": "#a7c8ff",
                        "surface-tint": "#3a5f94",
                        "on-tertiary-container": "#ff6d60",
                        "on-surface": "#191c1e",
                        "surface-container": "#eceef1",
                        "on-primary-fixed": "#001b3c",
                        "outline-variant": "#c3c6d1",
                        "surface-bright": "#f7f9fc",
                        "error": "#ba1a1a",
                        "secondary-fixed-dim": "#adcbda",
                        "on-primary-fixed-variant": "#1f477b",
                        "tertiary-fixed-dim": "#ffb4ab",
                        "secondary": "#466270",
                        "outline": "#737780",
                        "on-error-container": "#93000a",
                        "on-error": "#ffffff",
                        "error-container": "#ffdad6",
                        "surface-container-lowest": "#ffffff",
                        "on-tertiary-fixed": "#410002",
                        "on-secondary-fixed": "#001f2a"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "fontFamily": {
                        "headline": ["Public Sans"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    }
                },
            }
        }
    </script>
<style>
        body { font-family: 'Inter', sans-serif; }
        h1, h2, .font-headline { font-family: 'Public Sans', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            line-height: 1;
            text-transform: none;
            letter-spacing: normal;
            word-wrap: normal;
            white-space: nowrap;
            direction: ltr;
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface min-h-screen flex flex-col items-center">
<!-- TopAppBar -->
<header class="w-full top-0 sticky z-50 bg-slate-50 dark:bg-[#001e40] flex items-center px-4 h-16 w-full">
<div class="flex items-center gap-4">
<button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-slate-200/50 transition-colors duration-200">
<span class="material-symbols-outlined text-[#001e40] dark:text-slate-100" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-['Public_Sans'] font-semibold text-lg text-[#001e40] dark:text-slate-100">Score Entry Confirmation</h1>
</div>
</header>
<main class="w-full max-w-md px-6 py-8 pb-32 space-y-8">
<!-- Section 1: Student Info (Architectural Card) -->
<section class="relative bg-surface-container-lowest rounded-xl p-6 shadow-sm overflow-hidden">
<div class="absolute left-0 top-0 bottom-0 w-1.5 bg-primary"></div>
<div class="flex items-center gap-5">
<div class="w-16 h-16 rounded-lg bg-surface-container-low flex items-center justify-center">
<span class="material-symbols-outlined text-primary text-3xl" data-icon="account_box">account_box</span>
</div>
<div>
<h2 class="text-on-surface-variant font-label text-xs font-semibold uppercase tracking-widest mb-1">学员基本信息</h2>
<div class="flex flex-col">
<span class="text-xl font-bold font-headline text-on-surface">Zhang San</span>
<span class="text-sm font-body text-on-surface-variant">学号: 20230911042</span>
</div>
</div>
</div>
</section>
<!-- Section 2: Detailed Score Breakdown (Bento Style) -->
<section class="space-y-4">
<div class="flex justify-between items-end px-1">
<h3 class="font-headline font-semibold text-on-surface">细则核对</h3>
<span class="text-label-sm font-label text-[10px] text-on-surface-variant uppercase tracking-tighter bg-surface-container-high px-2 py-0.5 rounded">ITEMIZED BREAKDOWN</span>
</div>
<div class="grid grid-cols-1 gap-3">
<!-- Item 1 -->
<div class="flex justify-between items-center p-4 bg-surface-container-low rounded-xl border-l-4 border-transparent hover:border-primary-container transition-all">
<div class="flex items-center gap-3">
<div class="p-2 bg-white rounded-lg">
<span class="material-symbols-outlined text-primary-container" data-icon="wb_sunny">wb_sunny</span>
</div>
<span class="font-body font-medium text-on-surface">Morning Drill Attendance</span>
</div>
<span class="font-headline font-bold text-primary">+5</span>
</div>
<!-- Item 2 -->
<div class="flex justify-between items-center p-4 bg-surface-container-low rounded-xl border-l-4 border-transparent hover:border-primary-container transition-all">
<div class="flex items-center gap-3">
<div class="p-2 bg-white rounded-lg">
<span class="material-symbols-outlined text-primary-container" data-icon="bed">bed</span>
</div>
<span class="font-body font-medium text-on-surface">Dormitory Hygiene</span>
</div>
<span class="font-headline font-bold text-primary">+3</span>
</div>
<!-- Item 3 -->
<div class="flex justify-between items-center p-4 bg-surface-container-low rounded-xl border-l-4 border-transparent hover:border-primary-container transition-all">
<div class="flex items-center gap-3">
<div class="p-2 bg-white rounded-lg">
<span class="material-symbols-outlined text-primary-container" data-icon="school">school</span>
</div>
<span class="font-body font-medium text-on-surface">Class Participation</span>
</div>
<span class="font-headline font-bold text-primary">+2</span>
</div>
<!-- Item 4 -->
<div class="flex justify-between items-center p-4 bg-surface-container-low rounded-xl border-l-4 border-transparent hover:border-tertiary transition-all">
<div class="flex items-center gap-3">
<div class="p-2 bg-white rounded-lg">
<span class="material-symbols-outlined text-tertiary" data-icon="timer_off">timer_off</span>
</div>
<span class="font-body font-medium text-on-surface">Late for Meeting</span>
</div>
<span class="font-headline font-bold text-tertiary">-2</span>
</div>
</div>
</section>
<!-- Section 3: Total Score (Editorial Impact) -->
<section class="bg-primary bg-gradient-to-br from-primary to-primary-container rounded-xl p-8 text-on-primary shadow-xl">
<div class="flex flex-col items-center text-center">
<span class="font-label text-xs font-semibold uppercase tracking-[0.2em] opacity-80 mb-2">本次录入结算</span>
<div class="flex items-baseline gap-1">
<span class="text-5xl font-bold font-headline leading-none">8</span>
<span class="text-xl font-bold font-headline">PTS</span>
</div>
<div class="w-full h-[1px] bg-white/20 my-4"></div>
<div class="text-sm font-body opacity-90">确认数据无误后点击下方按钮提交</div>
</div>
</section>
<!-- Section 4: Remark Field -->
<section class="space-y-2">
<label class="block font-label text-xs font-semibold text-on-surface-variant uppercase ml-1">备注说明 (选填)</label>
<div class="relative">
<textarea class="w-full bg-transparent border-b-2 border-outline-variant/20 focus:border-primary focus:ring-0 px-1 py-3 text-on-surface transition-colors duration-300 resize-none min-h-[100px]" placeholder="输入补充信息..."></textarea>
</div>
</section>
</main>
<!-- Bottom Actions -->
<div class="fixed bottom-0 left-0 w-full p-6 bg-white/80 dark:bg-[#001e40]/80 backdrop-blur-xl border-t border-slate-200/20 flex flex-col gap-4 z-50">
<button class="w-full bg-gradient-to-br from-primary to-primary-container text-on-primary font-headline font-bold py-4 rounded-xl shadow-lg active:scale-[0.98] transition-transform duration-150 flex items-center justify-center gap-3">
<span class="material-symbols-outlined text-lg" data-icon="send">send</span>
            Confirm and Submit
        </button>
</div>
<!-- Background Decoration (Architectural feel) -->
<div class="fixed inset-0 -z-10 opacity-5 pointer-events-none overflow-hidden">
<div class="absolute top-[-10%] right-[-10%] w-[500px] h-[500px] rounded-full border-[60px] border-primary"></div>
<div class="absolute bottom-[-5%] left-[-5%] w-[300px] h-[300px] rounded-full border-[30px] border-primary-container"></div>
</div>
</body></html>
